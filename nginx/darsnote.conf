server {
    listen 80;
    server_name dars.saif.co.id;
    # Certbot will add SSL config here — run: certbot --nginx -d dars.saif.co.id
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dars.saif.co.id;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/dars.saif.co.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dars.saif.co.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Allow large file uploads (max 500 MB + buffer)
    client_max_body_size 550M;

    # Gzip
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;
    gzip_min_length 1024;
    gzip_vary       on;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Proxy to Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass       http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires          1y;
        add_header       Cache-Control "public, immutable";
    }
}
